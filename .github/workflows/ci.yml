name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run tests/unit/

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://lms:dummy@localhost:5432/mini_lms
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: mini-lms-storage
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin123
